# configuration for objects and agents, add scene as well
task_name: StackCube
scene:
  name: Robocasa
  env:
    scene_idx: 0
    layout_idx: 9  # 0-9
    style_idx: 3  # 0-11
    customized_layout: configs/robocasa_layout_9/customized_layout.yaml 
  primitives:
    - name: cubeA
      builder: mani_skill.utils.building.actors.build_cube
      params:
        half_size: 0.02
        color: [0.0392156863, 0.3176470588, 0.9686274510, 1.]
        name: cubeA
        initial_pose:
          p: [2.7, -3.4, 0.94]
      pos:
        ppos:
          p: [2.7, -3.4, 0.94]
        qpos: [1., 0., 0., 0.]
        randp_scale: [0.1, 0.1, 0.]
        randq_scale: [0., 0., 0., 0.]
        random_quaternions: [1, 1, 0]
    - name: cubeB
      builder: mani_skill.utils.building.actors.build_cube
      params:
        half_size: 0.02
        color: [0.9607843137, 0.0078431373, 0.8313725490, 1.]
        name: cubeB
        initial_pose:
          p: [2.85, -3.4, 0.94]
      pos:
        ppos:
          p: [2.85, -3.4, 0.94]
        qpos: [1., 0., 0., 0.]
        randp_scale: [0.1, 0.1, 0.]
        randq_scale: [0., 0., 0., 0.]
        random_quaternions: [1, 1, 0]
        
agents:
  - 
    robot_uid: panda-0
    pos:
      ppos:
        p: [2.235, -3.35, 0.92]
        q: [0., 0., 0.]
      qpos: [0., 0.3926990817, 0., -1.9634954085, 0., 2.3561944902, 0.7853981634, 0.04, 0.04]
      randp_scale: [0., 0., 0.]
      randq_scale: [0., 0., 0., 0., 0., 0., 0., 0., 0.]

cameras:
  sensor:
    - 
      uid: head_camera
      pose:
        type: look_at
        params: [[3.1, -2.85, 1.32], [2.75, -3.35, 1.02]]
      width: 512
      height: 512
      fov: 1.5707963268
      near: 0.1
      far: 10
  human_render:
    - 
      uid: render_camera
      pose:
        type: look_at
        params: [[3.45, -2.65, 1.52], [2.85, -3.35, 1.27]]
      width: 512
      height: 512
      fov: 1
      near: 0.01
      far: 100
