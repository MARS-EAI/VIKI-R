cameras:
  sensor:
    - 
      uid: head_camera
      pose:
        type: look_at
        params: [[0.1, -2.5, 3.0], [5.0, -2.5, 0.0]]
      width: 512
      height: 512
      fov: 1.5707963268
      near: 0.1
      far: 10
  human_render:
    - 
      uid: render_camera
      pose:
        type: look_at
        params: [[0., -2.5, 3.0], [5.0, -2.5, 0.0]]
      width: 512
      height: 512
      fov: 1
      near: 0.01
      far: 100

